<!DOCTYPE html>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e0b; }
textarea:focus { outline: 1px solid #c47b2b; }
button { cursor: pointer; }
button:disabled { opacity: 0.55; cursor: default; }
.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #c47b2b44} 50%{box-shadow:0 0 0 10px #c47b2b00} }
</style>

<div id="app" style="min-height:100vh;background:#0f0e0b;color:#ede4d8;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;"></div>

<script src="standalone.js"></script>
