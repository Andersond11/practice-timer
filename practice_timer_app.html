
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e0b; }
textarea:focus { outline: 1px solid #c47b2b; }
button { cursor: pointer; }
button:disabled { opacity: 0.55; cursor: default; }
.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #c47b2b44} 50%{box-shadow:0 0 0 10px #c47b2b00} }
</style>

<div id="app" style="min-height:100vh;background:#0f0e0b;color:#ede4d8;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;"></div>

<script>
const C = {
  bg:'#0f0e0b', surface:'#1c1a16', border:'#302c26',
  accent:'#c47b2b', brk:'#5a8fa5', text:'#ede4d8',
  muted:'#7a6e62', done:'#5a9165',
};

const DEFAULT_TEMPLATE = [
  {name:'Tone work — flute',minutes:10},
  {name:'Tone work — sax',minutes:10},
  {name:'Major scales',minutes:15},
  {name:'Break',minutes:5},
  {name:'Standard — head & changes',minutes:20},
  {name:'Break',minutes:5},
  {name:'Free improv',minutes:15},
];

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  screen: 'connect',      // connect | session | template | done
  items: [],              // [{name, minutes, done}]
  curIdx: null,
  timeLeft: 0,
  running: false,
  muted: false,
  template: [...DEFAULT_TEMPLATE],
  tplDraft: '',
  tplErr: '',
  toast: null,
  busy: false,
  fileLabel: '',
  prevScreen: 'connect',
};
let fh = null;          // FileHandle
let md = '';            // current file markdown string
let timerId = null;
let toastTimer = null;
let actx = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
const todayFname = () => `Practice - ${todayStr()}.md`;
const isBreak = n => /break/i.test(n);
const fmt = s => `${Math.floor(s/60)}:${pad(s%60)}`;

function buildMd(items){
  return [`# Practice — ${todayStr()}`,'', ...items.map(i=>`- [ ] ${i.name} (${i.minutes})`), ''].join('\n');
}
function parseItems(text){
  return text.split('\n').flatMap(line=>{
    const m = line.match(/^- \[([ x])\] (.+?) \((\d+)\)\s*$/);
    return m ? [{name:m[2],minutes:+m[3],done:m[1]==='x'}] : [];
  });
}
function applyDone(text,idx){
  let n=0;
  return text.split('\n').map(line=>{
    if(/^- \[([ x])\] .+? \(\d+\)\s*$/.test(line)){
      if(n++===idx) return line.replace('- [ ]','- [x]');
    }
    return line;
  }).join('\n');
}

// ── Audio ─────────────────────────────────────────────────────────────────────
function getCtx(){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function tone(freq,dur,type='sine',vol=0.22,delay=0){
  if(state.muted) return;
  try{
    const c=getCtx(), t=c.currentTime+delay;
    const osc=c.createOscillator(), g=c.createGain();
    osc.connect(g); g.connect(c.destination);
    osc.type=type; osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  }catch{}
}
const audio = {
  warn60: ()=>tone(660,0.45,'sine',0.2),
  warn10: ()=>[0,.17,.34].forEach(d=>tone(900,.1,'square',.18,d)),
  advance: ()=>[523,659,784].forEach((f,i)=>tone(f,.65,'sine',.2,i*.09)),
  breakIn: ()=>{ tone(440,.65,'sine',.16); tone(528,.5,'sine',.12,.32); },
  finish: ()=>{
    [523,659,784,1047].forEach((f,i)=>tone(f,1.1,'sine',.17,i*.13));
    tone(1568,1.5,'sine',.12,.65);
  },
};

// ── Storage ───────────────────────────────────────────────────────────────────
async function loadTemplate(){
  try{
    const r = await window.storage.get('pt_template');
    if(r) state.template = JSON.parse(r.value);
  }catch{}
}
async function saveTemplateStore(){
  try{ await window.storage.set('pt_template', JSON.stringify(state.template)); }catch{}
}

// ── File system ───────────────────────────────────────────────────────────────
async function connectVault(){
  if(!window.showDirectoryPicker){
    showToast('Requires Chrome or Edge (File System Access API)'); return;
  }
  setState({busy:true});
  try{
    const dir = await window.showDirectoryPicker({mode:'readwrite'});
    await openOrCreate(dir);
  }catch(e){
    if(e.name!=='AbortError') showToast('Could not open vault folder');
  }
  setState({busy:false});
}

async function openOrCreate(dir){
  const fname = todayFname();
  setState({fileLabel:fname});
  let fileHandle, content;
  try{
    fileHandle = await dir.getFileHandle(fname);
    content = await (await fileHandle.getFile()).text();
  }catch{
    content = buildMd(state.template);
    fileHandle = await dir.getFileHandle(fname,{create:true});
    const w = await fileHandle.createWritable();
    await w.write(content); await w.close();
    showToast(`Created ${fname}`);
  }
  fh = fileHandle;
  md = content;
  const items = parseItems(content);
  const first = items.findIndex(i=>!i.done);
  if(first>=0){
    setState({items, curIdx:first, timeLeft:items[first].minutes*60, screen:'session', running:false});
  }else{
    setState({items, screen:'done'});
  }
}

async function writeback(content){
  if(!fh) return;
  try{ const w=await fh.createWritable(); await w.write(content); await w.close(); }catch{}
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer(){
  if(timerId) clearInterval(timerId);
  timerId = setInterval(()=>{
    const t = state.timeLeft - 1;
    if(t===60) audio.warn60();
    if(t===10) audio.warn10();
    if(t<=0){
      clearInterval(timerId); timerId=null;
      setState({running:false,timeLeft:0});
      setTimeout(advance,80);
      return;
    }
    setState({timeLeft:t});
  },1000);
}

function stopTimer(){
  if(timerId){ clearInterval(timerId); timerId=null; }
}

async function advance(){
  const idx = state.curIdx;
  if(idx===null) return;
  const newMd = applyDone(md,idx);
  md = newMd;
  await writeback(newMd);
  const newItems = state.items.map((it,i)=>i===idx?{...it,done:true}:it);
  const next = newItems.findIndex((it,i)=>i>idx&&!it.done);
  if(next>=0){
    audio[isBreak(newItems[next].name)?'breakIn':'advance']();
    setState({items:newItems, curIdx:next, timeLeft:newItems[next].minutes*60});
  }else{
    audio.finish();
    setState({items:newItems, curIdx:null, screen:'done'});
  }
}

function toggleRun(){
  if(state.curIdx===null) return;
  if(state.running){ stopTimer(); setState({running:false}); }
  else{ setState({running:true}); startTimer(); }
}

function reset(){
  if(state.curIdx===null) return;
  stopTimer();
  setState({running:false, timeLeft:state.items[state.curIdx].minutes*60});
}

async function skip(){
  stopTimer();
  setState({running:false});
  await advance();
}

// ── Template ──────────────────────────────────────────────────────────────────
function openTemplate(){
  setState({
    prevScreen:state.screen,
    tplDraft:state.template.map(i=>`${i.name} (${i.minutes})`).join('\n'),
    tplErr:'',
    screen:'template',
  });
}

async function saveTemplate(){
  const lines = state.tplDraft.split('\n').filter(l=>l.trim());
  const parsed = [];
  for(const l of lines){
    const m=l.trim().match(/^(.+?) \((\d+)\)\s*$/);
    if(!m){ setState({tplErr:`Can't parse: "${l.trim()}" — use: Name (minutes)`}); return; }
    parsed.push({name:m[1],minutes:+m[2]});
  }
  state.template = parsed;
  await saveTemplateStore();
  showToast('Template saved');
  setState({screen:state.prevScreen});
}

// ── State & render ────────────────────────────────────────────────────────────
function setState(patch){
  Object.assign(state,patch);
  render();
}

function showToast(msg){
  if(toastTimer) clearTimeout(toastTimer);
  setState({toast:msg});
  toastTimer = setTimeout(()=>setState({toast:null}),2800);
}

function el(tag,attrs,...children){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'
      ? document.createTextNode(String(c)) : c);
  });
  return e;
}
function svg(tag,attrs,...children){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));
  children.forEach(c=>c&&e.appendChild(c));
  return e;
}

// Precompute circle constants
const R=96, CV=Math.PI*2*R;

function render(){
  const s=state;
  const cur = s.curIdx!==null ? s.items[s.curIdx] : null;
  const totalSecs = cur ? cur.minutes*60 : 0;
  const pct = totalSecs>0 ? s.timeLeft/totalSecs : 0;
  const offset = CV*(1-pct);
  const arcColor = cur&&isBreak(cur.name) ? C.brk : C.accent;
  const sessionPct = s.items.length
    ? s.items.filter(i=>i.done).reduce((a,i)=>a+i.minutes,0)/s.items.reduce((a,i)=>a+i.minutes,0)
    : 0;

  const topBar = el('div',{style:{
    width:'100%',maxWidth:'440px',display:'flex',
    justifyContent:'space-between',alignItems:'center',
    padding:'14px 20px 0',
  }},
    el('span',{style:{fontSize:'12px',color:C.muted,fontFamily:'monospace',letterSpacing:'0.3px'}},
      s.fileLabel||'practice timer'),
    el('div',{style:{display:'flex',gap:'8px'}},
      el('button',{
        style:{background:C.surface,border:`1px solid ${C.border}`,color:s.muted?C.brk:C.muted,
          borderRadius:'7px',padding:'5px 10px',fontSize:'15px'},
        title:s.muted?'Unmute':'Mute',
        onclick:()=>setState({muted:!s.muted}),
      }, s.muted?'♪̶':'♪'),
      el('button',{
        style:{background:C.surface,border:`1px solid ${C.border}`,color:C.muted,
          borderRadius:'7px',padding:'5px 10px',fontSize:'14px'},
        title:'Edit template', onclick:openTemplate,
      },'⚙'),
    )
  );

  const progressBar = el('div',{style:{width:'100%',maxWidth:'440px',padding:'8px 20px 0'}},
    el('div',{style:{height:'2px',background:C.border,borderRadius:'1px'}},
      el('div',{style:{
        height:'100%',borderRadius:'1px',
        width:`${sessionPct*100}%`,background:C.accent,
        transition:'width 0.6s ease',
      }})
    )
  );

  let screen;

  if(s.screen==='connect'){
    screen = el('div',{style:{
      flex:'1',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      gap:'20px',padding:'40px 32px',maxWidth:'380px',textAlign:'center',
    }},
      el('div',{style:{fontSize:'52px',lineHeight:'1',color:C.accent}},'♩'),
      el('div',{},
        el('div',{style:{fontSize:'22px',fontWeight:'600',marginBottom:'8px'}},'Practice Timer'),
        el('div',{style:{fontSize:'14px',color:C.muted,lineHeight:'1.65'}},
          'Points to your Obsidian vault. Loads or creates today\'s dated file from your template, then syncs checkbox state back as you go.'),
      ),
      el('button',{
        style:{background:C.accent,color:'#fff',border:'none',borderRadius:'10px',
          padding:'12px 30px',fontSize:'15px',fontWeight:'600'},
        disabled:s.busy,
        onclick:connectVault,
      }, s.busy?'Connecting…':'Open Vault Folder'),
      el('div',{style:{fontSize:'11px',color:C.muted}},
        'Chrome / Edge · File System Access API · vault is read+write'),
    );
  }

  else if(s.screen==='session'){
    // SVG circle timer
    const circle = svg('svg',{width:'220',height:'220',
      style:'transform:rotate(-90deg);display:block;'},
      svg('circle',{cx:'110',cy:'110',r:String(R),fill:'none',stroke:C.border,'stroke-width':'7'}),
      svg('circle',{cx:'110',cy:'110',r:String(R),fill:'none',
        stroke:arcColor,'stroke-width':'7','stroke-linecap':'round',
        'stroke-dasharray':String(CV),
        'stroke-dashoffset':String(offset),
        style:`transition:stroke-dashoffset 1s linear,stroke .4s ease`,
      })
    );

    const timerWrap = el('div',{style:{position:'relative',width:'220px',height:'220px',marginTop:'4px',flexShrink:'0'}},
      circle,
      el('div',{style:{
        position:'absolute',inset:'0',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',
      }},
        el('div',{style:{
          fontSize:'50px',fontWeight:'700',
          fontFamily:"'Courier New',Courier,monospace",
          letterSpacing:'-2px',color:C.text,lineHeight:'1',
        }},fmt(s.timeLeft)),
        cur ? el('div',{style:{fontSize:'11px',color:C.muted,marginTop:'3px'}},
          `${cur.minutes} min`) : null,
      )
    );

    const nameBlock = el('div',{style:{textAlign:'center',minHeight:'40px'}},
      el('div',{style:{fontSize:'18px',fontWeight:'600',marginBottom:'4px'}},
        cur?cur.name:'—'),
      (cur&&isBreak(cur.name)&&s.items[s.curIdx+1])
        ? el('div',{style:{fontSize:'12px',color:C.brk}},
            `up next · ${s.items[s.curIdx+1].name}`)
        : null,
    );

    // Controls
    const resetBtn = el('button',{
      onclick:reset,
      style:{width:'44px',height:'44px',borderRadius:'50%',background:C.surface,
        border:`1px solid ${C.border}`,color:C.muted,fontSize:'17px',
        display:'flex',alignItems:'center',justifyContent:'center'},
    },'↺');
    const playBtn = el('button',{
      onclick:toggleRun,
      class: s.running?'':'pulse',
      style:{width:'64px',height:'64px',borderRadius:'50%',
        background:s.running?'#383430':C.accent,
        border:'none',color:'#fff',fontSize:'22px',
        display:'flex',alignItems:'center',justifyContent:'center',
        transition:'background .2s'},
    }, s.running?'⏸':'▶');
    const skipBtn = el('button',{
      onclick:skip,
      style:{width:'44px',height:'44px',borderRadius:'50%',background:C.surface,
        border:`1px solid ${C.border}`,color:C.muted,fontSize:'17px',
        display:'flex',alignItems:'center',justifyContent:'center'},
    },'⏭');
    const controls = el('div',{style:{display:'flex',gap:'14px',alignItems:'center'}},
      resetBtn, playBtn, skipBtn);

    // Queue
    const queueItems = s.items.map((item,i)=>{
      const isCur = i===s.curIdx;
      const dotColor = item.done ? C.done : isCur ? C.accent : C.border;
      return el('div',{style:{
        display:'flex',alignItems:'center',gap:'12px',padding:'10px 16px',
        background:isCur?`${C.accent}18`:'transparent',
        borderBottom:i<s.items.length-1?`1px solid ${C.border}`:'none',
        opacity:item.done?'0.38':'1',
        transition:'opacity .3s,background .3s',
      }},
        el('div',{style:{
          width:'22px',height:'22px',borderRadius:'50%',flexShrink:'0',
          background:dotColor,color:'#fff',fontSize:'11px',
          display:'flex',alignItems:'center',justifyContent:'center',
          transition:'background .3s',
        }}, item.done?'✓':isCur?'▶':''),
        el('div',{style:{flex:'1',fontSize:'14px',
          color:isBreak(item.name)?C.brk:C.text}}, item.name),
        el('div',{style:{fontSize:'12px',color:C.muted}},`${item.minutes}m`),
      );
    });
    const queue = el('div',{style:{
      width:'100%',background:C.surface,borderRadius:'12px',
      border:`1px solid ${C.border}`,overflow:'hidden',
    }}, ...queueItems);

    screen = el('div',{style:{
      width:'100%',maxWidth:'440px',
      display:'flex',flexDirection:'column',alignItems:'center',
      padding:'14px 20px 32px',gap:'18px',
    }}, timerWrap, nameBlock, controls, queue);
  }

  else if(s.screen==='done'){
    const rows = s.items.map((item,i)=>
      el('div',{style:{
        display:'flex',gap:'10px',padding:'9px 14px',
        borderBottom:i<s.items.length-1?`1px solid ${C.border}`:'none',
        alignItems:'center',
      }},
        el('span',{style:{color:C.done,fontSize:'13px'}},'✓'),
        el('span',{style:{fontSize:'14px',flex:'1'}},item.name),
        el('span',{style:{fontSize:'12px',color:C.muted}},`${item.minutes}m`),
      )
    );
    screen = el('div',{style:{
      flex:'1',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      gap:'14px',padding:'40px 20px',maxWidth:'440px',width:'100%',
    }},
      el('div',{style:{fontSize:'38px',color:C.done}},'✓'),
      el('div',{style:{fontSize:'20px',fontWeight:'600'}},'Session complete'),
      el('div',{style:{fontSize:'13px',color:C.muted}},s.fileLabel),
      el('div',{style:{
        width:'100%',background:C.surface,borderRadius:'12px',
        border:`1px solid ${C.border}`,overflow:'hidden',marginTop:'6px',
      }}, ...rows),
      el('button',{
        onclick:()=>{
          fh=null; md='';
          setState({screen:'connect',items:[],curIdx:null,timeLeft:0,running:false});
        },
        style:{marginTop:'6px',background:C.surface,color:C.text,
          border:`1px solid ${C.border}`,borderRadius:'8px',
          padding:'10px 22px',fontSize:'14px'},
      },'New session'),
    );
  }

  else if(s.screen==='template'){
    const ta = el('textarea',{
      style:{
        width:'100%',minHeight:'280px',background:C.surface,color:C.text,
        border:`1px solid ${C.border}`,borderRadius:'8px',
        padding:'12px',fontSize:'14px',lineHeight:'1.8',
        fontFamily:"'Courier New',Courier,monospace",
        resize:'vertical',
      },
    });
    ta.value = s.tplDraft;
    ta.addEventListener('input',e=>{ state.tplDraft=e.target.value; state.tplErr=''; });

    screen = el('div',{style:{width:'100%',maxWidth:'440px',padding:'20px 20px 36px'}},
      el('div',{style:{fontSize:'16px',fontWeight:'600',marginBottom:'6px'}},'Practice template'),
      el('div',{style:{fontSize:'12px',color:C.muted,marginBottom:'14px',lineHeight:'1.7'}},
        'One item per line: ',
        el('code',{style:{background:C.surface,padding:'1px 6px',borderRadius:'4px',
          fontFamily:'monospace',fontSize:'12px',color:C.accent}},
          'Name (minutes)'),
        '. Use "Break" for rest items.'),
      ta,
      s.tplErr ? el('div',{style:{color:'#e06060',fontSize:'13px',marginTop:'8px'}},s.tplErr) : null,
      el('div',{style:{display:'flex',gap:'10px',marginTop:'14px'}},
        el('button',{onclick:saveTemplate,
          style:{background:C.accent,color:'#fff',border:'none',
            borderRadius:'8px',padding:'10px 22px',fontSize:'14px',fontWeight:'600'}},
          'Save'),
        el('button',{onclick:()=>setState({screen:s.prevScreen}),
          style:{background:C.surface,color:C.muted,
            border:`1px solid ${C.border}`,borderRadius:'8px',
            padding:'10px 16px',fontSize:'14px'}},
          'Cancel'),
      ),
    );
  }

  // Toast
  const toast = s.toast ? el('div',{style:{
    position:'fixed',bottom:'22px',left:'50%',transform:'translateX(-50%)',
    background:'#252018',color:C.text,borderRadius:'8px',
    padding:'9px 18px',fontSize:'13px',border:`1px solid ${C.border}`,
    whiteSpace:'nowrap',zIndex:'100',pointerEvents:'none',
  }},s.toast) : null;

  const showProgress = s.screen==='session'||s.screen==='done';

  const app = document.getElementById('app');
  app.innerHTML='';
  app.appendChild(topBar);
  if(showProgress) app.appendChild(progressBar);
  app.appendChild(screen);
  if(toast) app.appendChild(toast);
}

// Init
loadTemplate().then(render);
</script>
